<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>보안 문서 뷰어 - KODAF 2026</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        .viewer-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 구글 드라이브 UI 차단 레이어 */
        .ui-blocker {
            position: absolute;
            top: 0;
            right: 0;
            width: 100px;
            height: 100px;
            background: transparent;
            z-index: 9999;
            cursor: not-allowed;
        }

        /* 보안 오버레이 (드래그/우클릭 방지) */
        .secure-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            z-index: 100;
            pointer-events: none;
        }

        /* 워터마크 스타일 */
        .watermark-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
            overflow: hidden;
        }

        .watermark-item {
            position: absolute;
            white-space: nowrap;
            opacity: 1;
            transform: rotate(-25deg);
            font-family: 'Noto Sans KR', sans-serif;
        }

        @keyframes dynamicFloat {
            0% {
                transform: rotate(-25deg) translate(0, 0);
            }

            50% {
                transform: rotate(-25deg) translate(10px, 10px);
            }

            100% {
                transform: rotate(-25deg) translate(0, 0);
            }
        }

        .dynamic-float {
            animation: dynamicFloat 8s infinite ease-in-out;
        }
    </style>
</head>

<body>
    <div class="viewer-container">
        <!-- 워터마크 컨테이너를 뷰어 내부로 이동 -->
        <div class="watermark-container" id="watermark"></div>
        <iframe id="secureIframe"></iframe>
        <div class="ui-blocker" title="보안을 위해 외부 링크 기능이 차단되었습니다."></div>
        <div class="secure-overlay"></div>
    </div>

    <script>
        // 1. URL 파라미터에서 파일 ID 또는 URL 추출
        const params = new URLSearchParams(window.location.search);
        const fileId = params.get('id');
        const isLocal = params.get('local') === 'true';
        const judgeName = params.get('user') || '심사위원';

        if (fileId) {
            const iframe = document.getElementById('secureIframe');
            if (isLocal) {
                iframe.src = fileId;
            } else {
                const cleanId = fileId.match(/[-\w]{25,}/) ? fileId.match(/[-\w]{25,}/)[0] : fileId;
                iframe.src = `https://drive.google.com/file/d/${cleanId}/preview`;
            }
        }

        // 2. 워터마크 생성 (격자 배치를 통해 겹침 방지 및 가시성 개선)
        function createWatermark() {
            const container = document.getElementById('watermark');
            const dateStr = new Date().toLocaleDateString();

            const rows = 3;
            const cols = 3;

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const item = document.createElement('div');
                    item.className = 'watermark-item dynamic-float';
                    item.innerText = `${judgeName} | 보안 문서 | ${dateStr}`;
                    item.style.position = 'absolute';

                    // 격자 위치 계산
                    const left = (c * (100 / cols)) + (Math.random() * 10) + 5;
                    const top = (r * (100 / rows)) + (Math.random() * 10) + 5;

                    item.style.left = left + '%';
                    item.style.top = top + '%';
                    item.style.color = 'rgba(255, 255, 255, 1)'; // 완전한 흰색으로 수정
                    item.style.fontSize = '17px'; // 기존 16px에서 17px로 상향
                    item.style.fontWeight = '700';
                    item.style.pointerEvents = 'none';
                    item.style.whiteSpace = 'nowrap';
                    item.style.transform = `rotate(-25deg)`;
                    item.style.zIndex = '1000';
                    container.appendChild(item);
                }
            }
        }
        createWatermark();

        // 3. 보안 설정 (우클릭 등 차단)
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if ((e.ctrlKey || e.metaKey) && (e.key === 'c' || e.key === 'p' || e.key === 's')) e.preventDefault();
        });

        // 4. 포커스 이벤트 메시징 (메인 창 보안 제어용)
        window.addEventListener('focus', () => {
            if (window.opener) window.opener.postMessage('trusted-popup-focus', '*');
        });
        window.addEventListener('blur', () => {
            if (window.opener) window.opener.postMessage('trusted-popup-blur', '*');
        });

        // 팝업창 자체는 블러(검정 화면) 처리를 하지 않음 (사용자 요청)

        // 메인 창이 닫히면 함께 닫히도록 설정
        window.addEventListener('message', (e) => {
            if (e.data === 'close') window.close();
        });
    </script>
</body>

</html>
