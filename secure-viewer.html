<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>보안 문서 뷰어 - KODAF 2026</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        .viewer-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 구글 드라이브 UI 차단 레이어 */
        .ui-blocker {
            position: absolute;
            top: 0;
            right: 0;
            width: 100px;
            height: 100px;
            background: transparent;
            z-index: 9999;
            cursor: not-allowed;
        }

        /* 보안 오버레이 (드래그/우클릭 방지) */
        .secure-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            z-index: 100;
            pointer-events: none;
        }
    </style>
</head>

<body>
    <div class="watermark-container" id="watermark"></div>
    <div class="viewer-container">
        <iframe id="secureIframe"></iframe>
        <div class="ui-blocker" title="보안을 위해 외부 링크 기능이 차단되었습니다."></div>
        <div class="secure-overlay"></div>
    </div>

    <script>
        // 1. URL 파라미터에서 파일 ID 또는 URL 추출
        const params = new URLSearchParams(window.location.search);
        const fileId = params.get('id');
        const isLocal = params.get('local') === 'true';
        const judgeName = params.get('user') || '심사위원';

        if (fileId) {
            const iframe = document.getElementById('secureIframe');
            if (isLocal) {
                iframe.src = fileId;
            } else {
                const cleanId = fileId.match(/[-\w]{25,}/) ? fileId.match(/[-\w]{25,}/)[0] : fileId;
                iframe.src = `https://drive.google.com/file/d/${cleanId}/preview`;
            }
        }

        // 2. 워터마크 생성 (더 촘촘하고 잘 보이게 조정)
        function createWatermark() {
            const container = document.getElementById('watermark');
            const dateStr = new Date().toLocaleDateString();
            // 개수를 늘리고 색상을 조금 더 진하게 조정
            for (let i = 0; i < 40; i++) {
                const item = document.createElement('div');
                item.className = 'watermark-item dynamic-float';
                item.innerText = `${judgeName} | 보안 문서 | ${dateStr}`;
                item.style.position = 'absolute';
                item.style.left = (Math.random() * 90) + '%';
                item.style.top = (Math.random() * 95) + '%';
                item.style.color = 'rgba(200, 200, 200, 0.25)'; // 색상 가독성 향상
                item.style.fontSize = '16px';
                item.style.fontWeight = '700';
                item.style.pointerEvents = 'none';
                item.style.whiteSpace = 'nowrap';
                item.style.transform = `rotate(-25deg)`;
                item.style.zIndex = '1000';
                container.appendChild(item);
            }
        }
        createWatermark();

        // 3. 보안 설정 (우클릭 등 차단)
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if ((e.ctrlKey || e.metaKey) && (e.key === 'c' || e.key === 'p' || e.key === 's')) e.preventDefault();
        });

        // 팝업창은 포커스를 잃어도 항상 보여야 하므로 blur 이벤트에 블러 처리를 하지 않음

        // 메인 창이 닫히면 함께 닫히도록 설정 (필요 시)
        window.addEventListener('message', (e) => {
            if (e.data === 'close') window.close();
        });
    </script>
</body>

</html>
