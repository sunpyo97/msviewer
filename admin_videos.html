<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>출품작(영상/문서) 관리 - 관리자 패널</title>
    <link rel="stylesheet" href="style.css?v=2.0">
    <style>
        .bulk-textarea {
            width: 100%;
            height: 150px;
            font-family: monospace;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body class="admin-container">
    <main class="admin-main">
        <header class="admin-header">
            <div>
                <span class="status-badge">System Active</span>
                <h2>출품작(영상/문서) 데이터베이스 관리</h2>
            </div>
            <button class="btn secondary" onclick="window.saveAdminData()">전체 변경사항 저장</button>
        </header>

        <section class="admin-grid">
            <!-- 출품작 생성 섹션 -->
            <div class="config-group">
                <h4>신규 출품작 단건 등록</h4>
                <div class="form-container">
                    <label>출품작 고유 ID (유튜브/드라이브 ID)</label>
                    <input type="text" id="newVideoId" placeholder="예: 1IgWscu6jsZVLyspbIeBgbTw_BohoeSRc">

                    <label>작품 명 (Title)</label>
                    <input type="text" id="newVideoTitle" placeholder="예: 2026 KODAF 통합 캠페인">

                    <label>대분류 (Main Category)</label>
                    <select id="newVideoMainCat">
                        <!-- 스키마로부터 동적 로드 -->
                    </select>

                    <label>소분류 (Sub Category)</label>
                    <select id="newVideoSubCat">
                        <!-- 스키마로부터 동적 로드 -->
                    </select>

                    <label>자료 유형 (영상/문서)</label>
                    <select id="newVideoMetaType">
                        <option value="video">동영상 (유튜브/구글드라이브 영상)</option>
                        <option value="doc">문서 (구글드라이브 PDF, PPT)</option>
                    </select>

                    <button class="btn primary" id="addVideoBtn" style="width: 100%; margin-top: 15px;">출품작 등록</button>
                </div>

                <hr style="margin: 20px 0;">

                <h4>대량 일괄 등록 (CSV 복사 붙여넣기)</h4>
                <p style="font-size: 0.8rem; color: #666; margin-bottom: 10px;">
                    엑셀에서 복사한 데이터를 붙여넣으세요. 형식: ID, 제목, 대분류키, 소분류키, 유형(video/doc)<br>
                    예시: <code>abc_123, 삼성 캠페인, integrated_marketing, it_service, video</code>
                </p>
                <textarea id="bulkDataInput" class="bulk-textarea" placeholder="아이디, 작품명, 대분류코드, 소분류코드, 유형"></textarea>
                <button class="btn secondary" id="bulkAddBtn" style="width: 100%;">엑셀 데이터 일괄 구문 분석 및 추가</button>
            </div>

            <!-- 출품작 목록 섹션 -->
            <div class="config-group">
                <h4>등록된 출품작 현황 (<span id="totalVideoCount">0</span>건)</h4>
                <div style="overflow-x: auto; max-height: 600px; overflow-y: auto;">
                    <table class="results-table">
                        <thead>
                            <tr>
                                <th>제목</th>
                                <th>고유 ID</th>
                                <th>대분류 / 소분류</th>
                                <th>유형</th>
                                <th>관리</th>
                            </tr>
                        </thead>
                        <tbody id="videoListBody">
                            <!-- JS dynamic -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <!-- Firebase JS (Compat version for local file:// execution) -->
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-database-compat.js"></script>

    <script src="firebase-config.js"></script>
    <script src="judging-schema.js?v=2.0"></script>
    <script src="admin_common.js?v=2.0"></script>
    <script>
        // 사이드바 및 데이터 로드 초기화
        window.initAdminSidebar();

        // 관리자 데이터가 로드된 후 실행되는 렌더링 함수
        window.renderVideoList = function () {
            const body = document.getElementById('videoListBody');
            body.innerHTML = '';

            const videos = window.currentAdminData.videos || [];
            document.getElementById('totalVideoCount').innerText = videos.length;

            videos.forEach((v, index) => {
                const row = document.createElement('tr');
                // 구버전(mainCat/subCat)과 신버전(mainCategory/subCategory) 필드명 모두 대응
                const mainKey = v.mainCategory || v.mainCat || '';
                const subKey = v.subCategory || v.subCat || '';
                const mainCatName = JUDGING_SCHEMA[mainKey]?.name || mainKey || '-';
                const subCatName = JUDGING_SCHEMA[mainKey]?.sub?.[subKey]?.name || subKey || '-';
                const metaType = v.metaType || v.mainType || 'video';

                row.innerHTML = `
                    <td style="font-weight: bold; max-width: 200px; white-space: normal; word-break: break-all;">${v.title || '-'}</td>
                    <td style="font-size: 0.8rem; color: #555;">${v.id || '-'}</td>
                    <td style="font-size: 0.85rem;">${mainCatName}<br><span style="color:#888;">${subCatName}</span></td>
                    <td><span class="status-badge" style="background: ${metaType === 'video' ? 'var(--primary-color)' : '#9ca3af'};">${metaType.toUpperCase()}</span></td>
                    <td>
                        <button class="btn secondary" style="padding: 4px 8px; font-size:0.7rem;" onclick="window.deleteVideo(${index})">삭제</button>
                    </td>
                `;
                body.appendChild(row);
            });
        }

        // 스키마 드롭다운 로드
        function initCategoryDropdowns() {
            const mainSelect = document.getElementById('newVideoMainCat');
            const subSelect = document.getElementById('newVideoSubCat');

            mainSelect.innerHTML = '';
            Object.keys(JUDGING_SCHEMA).forEach(key => {
                const opt = document.createElement('option');
                opt.value = key;
                opt.innerText = JUDGING_SCHEMA[key].name;
                mainSelect.appendChild(opt);
            });

            mainSelect.addEventListener('change', () => {
                const mainCat = mainSelect.value;
                subSelect.innerHTML = '';
                if (JUDGING_SCHEMA[mainCat] && JUDGING_SCHEMA[mainCat].sub) {
                    Object.keys(JUDGING_SCHEMA[mainCat].sub).forEach(subKey => {
                        const opt = document.createElement('option');
                        opt.value = subKey;
                        opt.innerText = JUDGING_SCHEMA[mainCat].sub[subKey].name;
                        subSelect.appendChild(opt);
                    });
                }
            });

            // Trigger initially
            mainSelect.dispatchEvent(new Event('change'));
        }

        document.getElementById('addVideoBtn').addEventListener('click', () => {
            const id = document.getElementById('newVideoId').value.trim();
            const title = document.getElementById('newVideoTitle').value.trim();
            const mainCat = document.getElementById('newVideoMainCat').value;
            const subCat = document.getElementById('newVideoSubCat').value;
            const metaType = document.getElementById('newVideoMetaType').value;

            if (!id || !title) return alert('작품 고유 ID와 명칭을 반드시 입력해주세요.');

            if (!window.currentAdminData.videos) {
                window.currentAdminData.videos = [];
            }

            // 중복 확인
            if (window.currentAdminData.videos.find(v => v.id === id)) {
                return alert('이미 존재하는 고유 ID입니다.');
            }

            window.currentAdminData.videos.push({
                id: id,
                title: title,
                mainCategory: mainCat,
                subCategory: subCat,
                metaType: metaType
            });
            
            // 등록 후 필드 비우기
            document.getElementById('newVideoId').value = '';
            document.getElementById('newVideoTitle').value = '';

            window.renderVideoList();
            window.saveAdminData();
        });

        document.getElementById('bulkAddBtn').addEventListener('click', () => {
            const text = document.getElementById('bulkDataInput').value.trim();
            if (!text) return alert('데이터를 입력해주세요.');

            const lines = text.split('\n');
            let addedCount = 0;
            let errorCount = 0;

            if (!window.currentAdminData.videos) {
                window.currentAdminData.videos = [];
            }

            lines.forEach(line => {
                const parts = line.split(',');
                if (parts.length >= 5) {
                    const id = parts[0].trim();
                    const title = parts[1].trim();
                    const mainCat = parts[2].trim();
                    const subCat = parts[3].trim();
                    const metaType = parts[4].trim().toLowerCase(); // video or doc

                    if (id && title && !window.currentAdminData.videos.find(v => v.id === id)) {
                        window.currentAdminData.videos.push({
                            id: id,
                            title: title,
                            mainCategory: mainCat,
                            subCategory: subCat,
                            metaType: metaType
                        });
                        addedCount++;
                    } else {
                        errorCount++;
                    }
                }
            });

            alert(`총 ${addedCount}건 추가 완료 (중복/형식오류 무시: ${errorCount}건)`);
            document.getElementById('bulkDataInput').value = '';
            
            window.renderVideoList();
            window.saveAdminData();
        });

        window.deleteVideo = function (index) {
            if (confirm('이 출품작을 목록에서 정말 삭제하시겠습니까?')) {
                window.currentAdminData.videos.splice(index, 1);
                window.renderVideoList();
                window.saveAdminData();
            }
        };

        // 데이터가 모두 로드된 시점에 발생하는 이벤트를 가로채어 렌더링
        window.addEventListener('adminDataLoaded', () => {
            initCategoryDropdowns();
            window.renderVideoList();
        });

        if (window.currentAdminData && window.currentAdminData.videos) {
            initCategoryDropdowns();
            window.renderVideoList();
        }

    </script>
</body>

</html>
