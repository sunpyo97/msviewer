<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>심사위원 로그인 - KODAF 2026</title>
    <style>
        :root {
            --primary-color: #ff3b3b;
            --bg-dark: #0f0f0f;
            --card-bg: rgba(30, 30, 30, 0.8);
            --text-main: #ffffff;
            --text-secondary: #b0b0b0;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            overflow: hidden;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 2rem;
            letter-spacing: -1px;
        }

        .logo span {
            color: var(--primary-color);
        }

        h2 {
            font-size: 1.25rem;
            margin-bottom: 1.5rem;
            color: var(--text-main);
        }

        .input-group {
            margin-bottom: 1.25rem;
            text-align: left;
        }

        label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        input {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
            background: rgba(255, 255, 255, 0.1);
        }

        .btn {
            width: 100%;
            padding: 1rem;
            background-color: var(--primary-color);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 1rem;
            transition: transform 0.2s ease, filter 0.2s ease;
        }

        .btn:hover {
            filter: brightness(1.1);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .error-msg {
            color: #ff4d4d;
            font-size: 0.85rem;
            margin-top: 1rem;
            display: none;
        }

        .footer-note {
            margin-top: 2rem;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="logo">KO<span>DAF</span> 2026</div>
        <h2>심사위원 전용 로그인</h2>

        <div class="input-group">
            <label for="judgeId">아이디</label>
            <input type="text" id="judgeId" placeholder="아이디를 입력하세요">
        </div>

        <div class="input-group">
            <label for="judgePw">비밀번호</label>
            <input type="password" id="judgePw" placeholder="비밀번호를 입력하세요">
        </div>

        <div id="errorMsg" class="error-msg">로그인 정보가 올바르지 않습니다.</div>

        <button class="btn" id="loginBtn">로그인</button>

        <div style="margin-top: 1.5rem;">
            <a href="index.html"
                style="color: var(--text-secondary); font-size: 0.85rem; text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.2);">←
                메인 화면으로 돌아가기</a>
        </div>

        <div class="footer-note">
            대한민국 디지털 광고 대상 심사 시스템<br>
            데이터 유출 방지를 위해 모든 활동이 기록됩니다.
        </div>
    </div>

    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="login-script.js"></script>
</body>

</html>
