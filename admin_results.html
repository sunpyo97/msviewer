<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>심사 결과 대시보드 - 관리자 패널</title>
    <link rel="stylesheet" href="style.css?v=2.0">
</head>

<body class="admin-container">
    <main class="admin-main">
        <header class="admin-header">
            <div>
                <span class="status-badge">Real-time Data</span>
                <h2>심사 결과 대시보드</h2>
            </div>
            <div style="display: flex; gap: 10px; align-items: center;">
                <select id="judgeFilter"
                    style="padding: 8px; border-radius: 6px; border: 1px solid var(--border-color); background: white; font-size: 0.85rem;">
                    <option value="all">모든 심사위원</option>
                    <!-- JS dynamic -->
                </select>
                <button class="btn secondary" id="clearResultsBtn" style="font-size:0.85rem; border-color:#ef4444; color:#ef4444;">결과 초기화</button>
                <button class="btn primary" id="exportExcelBtn" style="font-size:0.85rem;">엑셀 내보내기</button>
            </div>
        </header>

        <section class="config-group" style="padding: 0; background: transparent; border: none; box-shadow: none;">
            <div
                style="overflow-x: auto; background: #ffffff; border: 1px solid #e2e8f0; border-radius: 12px; box-shadow: var(--shadow-sm);">
                <table class="results-table">
                    <thead>
                        <tr>
                            <th>시간</th>
                            <th>심사위원</th>
                            <th>출품번호</th>
                            <th>영상정보</th>
                            <th>전략성</th>
                            <th>기술성</th>
                            <th>예술성</th>
                            <th>전달력</th>
                            <th>대중성</th>
                            <th>심사평</th>
                            <th>총점</th>
                        </tr>
                    </thead>
                    <tbody id="dashboardBody">
                        <!-- JS dynamic -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Firebase JS (Compat version for local file:// execution) -->
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-database-compat.js"></script>

    <!-- 결과 초기화 확인 모달 -->
    <div id="clearResultsModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:9999; align-items:center; justify-content:center;">
        <div style="background:white; padding:32px; border-radius:14px; width:90%; max-width:460px; color:#333; box-shadow:0 20px 60px rgba(0,0,0,0.4);">
            <div style="display:flex; align-items:center; gap:10px; margin-bottom:12px;">
                <span style="font-size:1.8rem;">⚠️</span>
                <h2 style="margin:0; font-size:1.2rem; color:#dc2626;">전체 심사 결과 초기화</h2>
            </div>
            <p style="color:#374151; margin:0 0 8px 0; line-height:1.6;">
                현재 등록된 <strong id="clearResultsCount" style="color:#dc2626;"></strong>의 심사 결과가 <strong>영구 삭제</strong>됩니다.<br>
                삭제 전 엑셀(CSV) 파일로 전체 데이터가 다운로드됩니다.
            </p>
            <div style="background:#fef2f2; border:1px solid #fecaca; border-radius:8px; padding:12px; margin-bottom:20px;">
                <p style="margin:0; font-size:0.85rem; color:#dc2626;">⚠ 삭제된 데이터는 복구할 수 없습니다. 신중하게 진행하세요.</p>
            </div>
            <label style="display:block; font-size:0.9rem; font-weight:600; margin-bottom:6px; color:#374151;">
                계속하려면 아래에 <code style="background:#f1f5f9; padding:2px 6px; border-radius:4px;">초기화</code> 를 입력하세요.
            </label>
            <input id="clearResultsConfirmInput" type="text" placeholder="초기화" autocomplete="off"
                style="width:100%; padding:10px 12px; border:1px solid #d1d5db; border-radius:8px; font-size:1rem; box-sizing:border-box; margin-bottom:16px; outline:none;">
            <div style="display:flex; gap:10px;">
                <button id="clearResultsCancelBtn" style="flex:1; padding:10px; background:#f1f5f9; border:1px solid #cbd5e1; border-radius:8px; font-size:0.95rem; font-weight:600; cursor:pointer; color:#374151;">취소</button>
                <button id="clearResultsConfirmBtn" disabled
                    style="flex:1; padding:10px; background:#dc2626; border:none; border-radius:8px; font-size:0.95rem; font-weight:700; cursor:pointer; color:white; opacity:0.4; transition:opacity 0.2s;">
                    엑셀 다운로드 후 삭제
                </button>
            </div>
            <p id="clearResultsStatus" style="margin:12px 0 0 0; font-size:0.85rem; color:#64748b; text-align:center; min-height:1.2em;"></p>
        </div>
    </div>

    <script src="firebase-config.js"></script>
    <script src="judging-schema.js"></script>
    <script src="admin_common.js"></script>
    <script>
        window.initAdminSidebar();

        window.renderDashboard = function () {
            const body = document.getElementById('dashboardBody');
            const judgeFilter = document.getElementById('judgeFilter');
            body.innerHTML = '';

            if (window.currentAdminData.results.length === 0) {
                body.innerHTML = `<tr><td colspan="11" style="text-align:center; padding: 3rem; color:var(--text-secondary);">심사 결과 데이터를 기다리는 중입니다...</td></tr>`;
                return;
            }

            // Populate the judge filter if it hasn't been populated yet (excluding the 'All' option)
            if (judgeFilter.options.length <= 1) {
                // Determine unique judges from the results
                const uniqueJudges = new Map();
                window.currentAdminData.results.forEach(res => {
                    if (!uniqueJudges.has(res.judgeId)) {
                        uniqueJudges.set(res.judgeId, res.judgeName);
                    }
                });

                // Add unique judges to the dropdown
                uniqueJudges.forEach((name, id) => {
                    const option = document.createElement('option');
                    option.value = id;
                    option.innerText = name;
                    judgeFilter.appendChild(option);
                });
            }

            const selectedJudgeId = judgeFilter.value;

            // Filter results based on the selection
            const filteredResults = selectedJudgeId === 'all'
                ? window.currentAdminData.results
                : window.currentAdminData.results.filter(r => r.judgeId === selectedJudgeId);

            if (filteredResults.length === 0) {
                body.innerHTML = `<tr><td colspan="11" style="text-align:center; padding: 3rem; color:var(--text-secondary);">해당 심사위원의 심사 결과가 없습니다.</td></tr>`;
                return;
            }

            filteredResults.forEach(res => {
                const row = document.createElement('tr');
                const mainName = JUDGING_SCHEMA[res.mainCat]?.name || res.mainCat;
                const subName = JUDGING_SCHEMA[res.mainCat]?.sub[res.subCat]?.name || res.subCat;
                const s = res.scores || {};

                row.innerHTML = `
                    <td style="font-size:0.75rem;">${new Date(res.timestamp).toLocaleString('ko-KR', {month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit'})}</td>
                    <td>${res.judgeName}</td>
                    <td style="font-weight:bold; color:var(--primary-color);">${res.videoId}</td>
                    <td style="font-size:0.75rem;">[${mainName}>${subName}] ${res.videoTitle}</td>
                    <td>${s.strategic || 0}</td>
                    <td>${s.technical || 0}</td>
                    <td>${s.artistic || 0}</td>
                    <td>${s.delivery || 0}</td>
                    <td>${s.performance || 0}</td>
                    <td style="font-size:0.75rem; max-width:180px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${res.comment || '-'}</td>
                    <td style="color:var(--primary-color); font-weight:bold;">${res.total}</td>
                `;
                body.appendChild(row);
            });
        }

        // Add event listener to re-render when the filter changes
        document.getElementById('judgeFilter').addEventListener('change', window.renderDashboard);

        document.getElementById('exportExcelBtn').addEventListener('click', () => {
            const selectedJudgeId = document.getElementById('judgeFilter').value;
            const filteredResults = selectedJudgeId === 'all'
                ? window.currentAdminData.results
                : window.currentAdminData.results.filter(r => r.judgeId === selectedJudgeId);

            if (filteredResults.length === 0) return alert('추출할 데이터가 없습니다.');

            let csv = "\uFEFF일시,심사위원ID,심사위원성함,대분류,소분류,영상번호,영상제목,전략성,기술성,예술성,메시지전달력,성과대중성,심사평,총합\n";
            filteredResults.forEach(res => {
                const s = res.scores || {};
                const row = [
                    res.timestamp, res.judgeId, res.judgeName,
                    JUDGING_SCHEMA[res.mainCat]?.name, JUDGING_SCHEMA[res.mainCat]?.sub[res.subCat]?.name,
                    res.videoId, `"${(res.videoTitle || '').replace(/"/g, '""')}"`,
                    s.strategic, s.technical, s.artistic, s.delivery, s.performance,
                    `"${res.comment || ''}"`, res.total
                ].join(',');
                csv += row + "\n";
            });

            const judgeNameForFile = selectedJudgeId === 'all'
                ? 'All'
                : filteredResults[0].judgeName.replace(/[^a-z0-9가-힣]/gi, '_'); // Regex to sanitize filename

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `Judge_Results_${judgeNameForFile}_${new Date().getTime()}.csv`;
            link.click();
        });

        // === 결과 초기화 모달 로직 ===
        const clearModal = document.getElementById('clearResultsModal');
        const clearInput = document.getElementById('clearResultsConfirmInput');
        const clearConfirmBtn = document.getElementById('clearResultsConfirmBtn');
        const clearStatusEl = document.getElementById('clearResultsStatus');

        document.getElementById('clearResultsBtn').addEventListener('click', () => {
            const count = (window.currentAdminData.results || []).length;
            if (count === 0) { alert('삭제할 심사 결과가 없습니다.'); return; }
            document.getElementById('clearResultsCount').innerText = `${count}건`;
            clearInput.value = '';
            clearConfirmBtn.disabled = true;
            clearConfirmBtn.style.opacity = '0.4';
            clearStatusEl.innerText = '';
            clearModal.style.display = 'flex';
        });

        document.getElementById('clearResultsCancelBtn').addEventListener('click', () => {
            clearModal.style.display = 'none';
        });

        clearInput.addEventListener('input', () => {
            const match = clearInput.value.trim() === '초기화';
            clearConfirmBtn.disabled = !match;
            clearConfirmBtn.style.opacity = match ? '1' : '0.4';
        });

        clearConfirmBtn.addEventListener('click', async () => {
            clearConfirmBtn.disabled = true;
            clearStatusEl.style.color = '#64748b';
            clearStatusEl.innerText = '엑셀 다운로드 및 삭제 중...';

            try {
                // 1. 전체 데이터 엑셀(CSV) 다운로드
                const resultsToExport = window.currentAdminData.results || [];
                if (resultsToExport.length > 0) {
                    let csv = "\uFEFF일시,심사위원ID,심사위원성함,대분류,소분류,영상번호,영상제목,전략성,기술성,예술성,메시지전달력,성과대중성,심사평,총합\n";
                    resultsToExport.forEach(res => {
                        const s = res.scores || {};
                        const row = [
                            res.timestamp, res.judgeId, res.judgeName,
                            JUDGING_SCHEMA[res.mainCat]?.name, JUDGING_SCHEMA[res.mainCat]?.sub[res.subCat]?.name,
                            res.videoId, `"${(res.videoTitle || '').replace(/"/g, '""')}"`,
                            s.strategic, s.technical, s.artistic, s.delivery, s.performance,
                            `"${res.comment || ''}"`, res.total
                        ].join(',');
                        csv += row + "\n";
                    });

                    const now = new Date();
                    const stamp = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}${String(now.getSeconds()).padStart(2,'0')}`;
                    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                    const link = document.createElement("a");
                    link.href = URL.createObjectURL(blob);
                    link.download = `Judge_Results_Backup_${stamp}.csv`;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                }

                // 2. results 노드만 직접 삭제 (saveAdminData 우회 — results는 별도 경로로 관리)
                await window.firebaseSet(window.firebaseRef(window.firebaseDB, 'adminData/results'), {});

                // 3. 로컬 메모리 초기화 및 UI 갱신
                window.currentAdminData.results = [];
                window.renderDashboard();

                clearStatusEl.style.color = '#059669';
                clearStatusEl.innerText = `✅ 엑셀 다운로드 및 삭제 완료.`;

                setTimeout(() => { clearModal.style.display = 'none'; }, 2500);
            } catch (err) {
                console.error('결과 초기화 실패:', err);
                clearStatusEl.style.color = '#dc2626';
                clearStatusEl.innerText = '오류 발생. 데이터는 삭제되지 않았습니다.';
                clearConfirmBtn.disabled = false;
            }
        });

        window.addEventListener('adminDataLoaded', () => {
            window.renderDashboard();
        });

        if (window.currentAdminData && window.currentAdminData.results) {
            window.renderDashboard();
        }
    </script>
</body>

</html>
